name: Publish placeholder package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Placeholder version to publish once"
        required: true
        default: "0.0.0"
        type: string
      mode:
        description: "Use dry-run until npm Trusted Publishing is configured"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-placeholder-publish
  cancel-in-progress: false

jobs:
  publish-placeholder:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Create placeholder package
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const version = process.env.VERSION;
          if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid placeholder version: ${version}`);
          }

          fs.mkdirSync('placeholder-package', { recursive: true });
          fs.writeFileSync('placeholder-package/package.json', `${JSON.stringify({
            name: '@notchrisbutler/superduperpowers',
            version,
            description: 'Placeholder package reserving the SuperDuperPowers npm name.',
            license: 'MIT',
            private: false,
            publishConfig: {
              access: 'public'
            }
          }, null, 2)}\n`);
          fs.writeFileSync('placeholder-package/README.md', `# @notchrisbutler/superduperpowers\n\nPlaceholder package reserving the npm package name for SuperDuperPowers.\n\nUse the GitHub repository until the full package is published:\n\nhttps://github.com/notchrisbutler/superduperpowers\n`);
          NODE

      - name: Check placeholder package contents
        working-directory: placeholder-package
        run: npm pack --dry-run

      - name: Stop after dry run
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          echo "Dry run complete. Re-run with mode=publish after npm Trusted Publishing is configured for publish-placeholder.yml."

      - name: Publish placeholder package
        if: ${{ inputs.mode == 'publish' }}
        working-directory: placeholder-package
        run: npm publish --access public --provenance --tag placeholder
