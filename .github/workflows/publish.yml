name: Publish package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without leading v, for example YYYY.M.D"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag to update"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - prerelease
      mode:
        description: "Use dry-run to validate without publishing"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - publish
permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve release metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
          INPUT_MODE: ${{ inputs.mode }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const env = process.env;
          const version = env.INPUT_VERSION;
          const distTag = env.INPUT_DIST_TAG;
          const mode = env.INPUT_MODE;

          if (!/^\d+\.\d+\.\d+(?:-[1-9]\d*)?$/.test(version)) {
            throw new Error(`Version must be YYYY.M.D or YYYY.M.D-N: ${version}`);
          }
          if (!['latest', 'prerelease'].includes(distTag)) {
            throw new Error(`Unsupported npm dist-tag: ${distTag}`);
          }
          if (!['dry-run', 'publish'].includes(mode)) {
            throw new Error(`Unsupported mode: ${mode}`);
          }

          fs.appendFileSync(env.GITHUB_ENV, `VERSION=${version}\nDIST_TAG=${distTag}\nMODE=${mode}\n`);
          console.log(`version=${version}`);
          console.log(`dist_tag=${distTag}`);
          console.log(`mode=${mode}`);
          NODE

      - name: Validate package metadata
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import process from 'node:process';

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.name !== '@notchrisbutler/superduperpowers') {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          if (pkg.private) {
            throw new Error('package.json must not be private for npm publishing');
          }
          if (pkg.repository?.url !== 'https://github.com/notchrisbutler/superduperpowers') {
            throw new Error(`Unexpected repository.url: ${pkg.repository?.url}`);
          }
          if (pkg.version !== process.env.VERSION) {
            throw new Error(`package.json version ${pkg.version} does not match release version ${process.env.VERSION}`);
          }
          NODE

      - name: Dry run npm publish
        run: npm publish --access public --provenance --tag "$DIST_TAG" --dry-run

      - name: Stop after dry run
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          echo "npm publish dry run passed for v${VERSION} with npm dist-tag ${DIST_TAG}."

      - name: Publish to npm
        if: ${{ inputs.mode == 'publish' }}
        run: npm publish --access public --provenance --tag "$DIST_TAG"
